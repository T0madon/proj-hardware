<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Monitor de Frutas Inteligente</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header>
            <h1>Fruteira Inteligente - Painel de Controle</h1>
            <div style="display: flex; gap: 10px; align-items: center">
                <input
                    type="text"
                    id="ipEsp"
                    placeholder="Digite o IP do ESP32"
                    value="192.168.1.100"
                    style="padding: 10px; border-radius: 4px; border: none"
                />
                <button id="btnConectar">📡 Conectar Wi-Fi</button>
                <span id="statusConexao" class="desconectado"
                    >Desconectado</span
                >
            </div>
        </header>

        <main>
            <section class="card dados-real">
                <h2>Dados Atualizados do Hardware</h2>
                <div class="grid-dados">
                    <div class="dado-item">
                        Peso: <span id="valPeso">0.0</span> kg
                    </div>
                    <div class="dado-item">
                        Temp: <span id="valTemp">0.0</span> °C
                    </div>
                    <div class="dado-item">
                        Umidade: <span id="valUmid">0</span> %
                    </div>
                    <div class="dado-item">
                        Índice Gás: <span id="valGas">0</span>
                    </div>
                    <div class="dado-item">
                        Índice Álcool: <span id="valAlc">0</span>
                    </div>
                </div>
                <div id="statusFruta" class="status-barra">
                    Aguardando dados...
                </div>
            </section>

            <section class="card form-crud">
                <h2 id="tituloForm">Nova Configuração</h2>
                <form id="crudForm">
                    <input type="hidden" id="configId" />
                    <label>Nome do Perfil (ex: Bananas):</label>
                    <input
                        type="text"
                        id="nomePerfil"
                        placeholder="Nome da fruta"
                        required
                    />

                    <div class="row">
                        <div>
                            <label>Limite Gás Bom (Até):</label>
                            <input
                                type="number"
                                step="0.01"
                                id="limiteGasBom"
                                value="0.95"
                                required
                            />
                        </div>
                        <div>
                            <label>Limite Gás Alerta (Até):</label>
                            <input
                                type="number"
                                step="0.01"
                                id="limiteGasAlerta"
                                value="0.90"
                                required
                            />
                        </div>
                    </div>

                    <div class="botoes-form">
                        <button type="submit" class="btn-salvar">
                            Salvar Configuração
                        </button>
                        <button
                            type="button"
                            id="btnCancelar"
                            class="btn-cancelar"
                            style="display: none"
                        >
                            Cancelar Edição
                        </button>
                    </div>
                </form>
            </section>

            <section class="card lista-crud">
                <h2>Perfis Salvos (LocalStorage)</h2>
                <ul id="listaConfigs"></ul>
            </section>
        </main>

        <script src="app.js"></script>
    </body>
</html>
